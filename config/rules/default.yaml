rules:
  - id: "NW-001"
    name: "SSH Brute Force Attempt"
    severity: "CRITICAL"
    protocol: "tcp"
    dst_port: 22
    flags: "SYN"
    threshold:
      count: 10
      seconds: 60
      by: "src_ip"

  - id: "NW-002"
    name: "SQL Injection in HTTP"
    severity: "CRITICAL"
    protocol: "tcp"
    dst_port: [80, 8080, 443, 8443]
    content:
      - "UNION SELECT"
      - "OR 1=1"
    content_nocase: true

  - id: "NW-003"
    name: "Outbound IRC Traffic"
    severity: "WARNING"
    protocol: "tcp"
    dst_port: [6667, 6668, 6669, 6697]

  - id: "NW-004"
    name: "DNS Zone Transfer Attempt"
    severity: "CRITICAL"
    protocol: "tcp"
    dst_port: 53

  - id: "NW-005"
    name: "HTTP Command Injection"
    severity: "CRITICAL"
    protocol: "tcp"
    dst_port: [80, 8080, 443, 8443]
    content:
      - "| wget"
    content_nocase: true
    pcre:
      - "(?i)[;|`]\\s*(?:wget|curl|nc|bash|sh|python|perl|ruby)\\b"
      - "(?i)(?:\\$\\(|`).*(?:wget|curl|nc|bash)"

  - id: "NW-006"
    name: "SMB NULL Session"
    severity: "WARNING"
    protocol: "tcp"
    dst_port: 445
    content:
      - "IPC$"
